name: Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Required to create a release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build nufmt
        run: cargo build --release

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "v" + (Get-Date -Format "yyyyMMdd.HHmm")
          # Rename the binary to match mise's expected pattern
          $asset_name = "nufmt-windows-x86_64.exe"
          Copy-Item ".\target\release\nufmt.exe" ".\$asset_name"
          # Create release and upload the renamed file
          gh release create $version ".\$asset_name" --title "Manual Build $version" --notes "Automated Windows build for mise"
